# Example collection config (YAML). Requires PyYAML. Equivalent to example.toml.
# NEVER put API keys here — only the NAME of the env var that holds each key.
# Model ids are ILLUSTRATIVE; verify current ids in each provider's docs.

output_dir: outputs
prompt_path: prompts/mcq_generation.txt
request_pause_s: 1.0

grid:
  subjects: [history, biology, computer_science, economics, geography]
  difficulties: [easy, medium, hard]
  n_per_cell: 30
  k_options: 4

decoding:
  temperature: 0.7
  top_p: 1.0
  seed: 7
  max_tokens: 4000

retry:
  max_retries: 5
  base_delay_s: 2.0
  max_delay_s: 60.0
  jitter: true

tracking:
  backend: jsonl          # jsonl | mlflow | none
  experiment_name: mcq-length-bias-collection
  # uri: file:./mlruns

providers:
  - name: openai
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    enabled: true
  - name: anthropic
    model: claude-3-5-sonnet-latest
    api_key_env: ANTHROPIC_API_KEY
    enabled: true
  - name: google
    model: gemini-1.5-pro
    api_key_env: GOOGLE_API_KEY
    enabled: true
  - name: meta
    model: llama-3.1-70b-instruct
    api_key_env: LLAMA_API_KEY
    # base_url: https://api.together.xyz/v1
    enabled: false
  - name: mistral
    model: mistral-large-latest
    api_key_env: MISTRAL_API_KEY
    enabled: false
